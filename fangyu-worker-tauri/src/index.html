<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>方隅·行</title>
    <style>
      :root { color-scheme: light dark; font-family: "Segoe UI", system-ui, sans-serif; }
      body { margin: 0; padding: 20px; background: #0f1419; color: #e7ecf1; }
      h1 { font-size: 18px; margin: 0 0 8px; }
      .muted { color: #9aa7b5; font-size: 12px; margin-bottom: 16px; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
      button {
        border: 1px solid #3a4654; background: #1b2430; color: #e7ecf1;
        border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 12px;
      }
      button:hover { background: #243040; }
      #status { font-size: 13px; padding: 10px 12px; border-radius: 8px; background: #1b2430; border: 1px solid #3a4654; }
      .ok { color: #4ade80; }
      .bad { color: #f87171; }
    </style>
  </head>
  <body>
    <h1>方隅·行</h1>
    <div class="muted">本机 Worker 托盘壳 · 关闭窗口不会退出（请用托盘「退出」）</div>
    <div id="status">检查中…</div>
    <div class="row">
      <button id="btn-restart">重启 Worker</button>
      <button id="btn-studio">打开方隅·序</button>
    </div>
    <script type="module">
      const { invoke } = window.__TAURI__.core
      const statusEl = document.getElementById('status')
      async function refresh() {
        try {
          const s = await invoke('worker_status')
          const ok = s === 'running'
          statusEl.className = ok ? 'ok' : 'bad'
          statusEl.textContent = ok ? 'Worker 运行中' : `Worker 状态: ${s}`
        } catch (e) {
          statusEl.className = 'bad'
          statusEl.textContent = String(e)
        }
      }
      document.getElementById('btn-restart').onclick = async () => {
        await invoke('restart_worker_cmd')
        await refresh()
      }
      document.getElementById('btn-studio').onclick = () => {
        window.open('http://localhost:5173', '_blank')
      }
      refresh()
      setInterval(refresh, 3000)
    </script>
  </body>
</html>
