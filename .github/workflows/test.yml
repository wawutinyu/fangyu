name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  fangyu-canvas:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install fangyu (for export↔engine parity)
        run: pip install -e ".[dev]" pytest cryptography

      - run: npm ci

      - name: TypeScript check
        run: npm run typecheck -w fangyu-canvas

      - name: Lint
        run: npm run lint -w fangyu-canvas

      - name: Vitest fast (excl. parity subprocess)
        run: npm run test:fast -w fangyu-canvas

      - name: Vitest export parity
        run: npm run test:slow -w fangyu-canvas

  fangyu-studio:
    runs-on: ubuntu-latest
    needs: fangyu-canvas
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npm run typecheck -w fangyu-studio

      - name: Build
        run: npm run build -w fangyu-studio

      - name: Install Playwright
        run: npx playwright install chromium

      - name: E2E
        run: npm run test:e2e -w fangyu-studio

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.14']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install fangyu
        run: pip install -e ".[dev]" pytest cryptography

      - name: Python unit tests
        run: python -m pytest tests/unit/ -q

      - name: Core integration (happy path + bundle)
        run: python -m pytest tests/integration/test_happy_path.py tests/integration/test_bundle_runtime.py -q --tb=line

  api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install fangyu
        run: pip install -e .

      - name: Start API server
        run: |
          HOST=127.0.0.1 PORT=8000 nohup python -m fangyu --server &
          sleep 5

      - name: API integration tests
        run: python tests/integration/check_all_features_api.py
