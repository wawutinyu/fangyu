name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  fangyu-flow:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fangyu-flow

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fangyu-flow/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install fangyu (for export↔engine parity)
        run: pip install -e "..[dev]" pytest cryptography

      - run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Vitest fast (excl. parity subprocess)
        run: npm run test:fast

      - name: Vitest export parity
        run: npm run test:slow

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: npx playwright install chromium

      - name: E2E
        run: npm run test:e2e

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.14']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install fangyu
        run: pip install -e ".[dev]" pytest cryptography

      - name: Python unit tests
        run: python -m pytest tests/unit/ -q

  api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install fangyu
        run: pip install -e .

      - name: Start API server
        run: |
          HOST=127.0.0.1 PORT=8000 nohup python -m fangyu --server &
          sleep 5

      - name: API integration tests
        run: python tests/integration/check_all_features_api.py
