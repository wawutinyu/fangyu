# 持续部署（CD）— 贴合现网：venv + systemd + nginx /fangyu/
#
# 触发：
#   1) main 上名为 "CI" 的 workflow 成功结束后自动部署
#   2) 手动 Actions → Deploy → Run workflow
#
# Secrets（仓库 Settings → Secrets and variables → Actions）：
#   DEPLOY_HOST      例 117.72.174.168
#   DEPLOY_USER      例 root
#   DEPLOY_SSH_KEY   部署专用私钥全文（含 -----BEGIN ... PRIVATE KEY-----）
# Variables（可选）：
#   DEPLOY_HEALTH_URL  默认 https://$DEPLOY_HOST/api/health
#   DEPLOY_UI_URL      默认 https://$DEPLOY_HOST/fangyu/

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy systemd (/opt/fangyu)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success'
          && (github.event.workflow_run.head_branch == 'main'
              || github.event.workflow_run.head_branch == 'master'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run 默认检出的是默认分支 tip；改用触发 CI 的那次 commit
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install & build Studio (/fangyu/)
        run: |
          npm ci
          BASE_PATH=/fangyu/ npm run build -w fangyu-studio
          test -f fangyu-studio/dist/index.html

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync to server
        env:
          TARGET: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
          REMOTE_DIR: /opt/fangyu
        run: |
          rsync -az --delete \
            --exclude .git \
            --exclude .venv \
            --exclude node_modules \
            --exclude '**/node_modules' \
            --exclude data \
            --exclude .env \
            --exclude .env.deploy \
            --exclude .fangyu \
            --exclude '**/__pycache__' \
            --exclude .pytest_cache \
            ./ "${TARGET}:${REMOTE_DIR}/"

      - name: Install Python deps & restart
        env:
          TARGET: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
          REMOTE_DIR: /opt/fangyu
        run: |
          ssh "$TARGET" bash -s <<EOF
          set -euo pipefail
          cd '$REMOTE_DIR'
          if [[ ! -d .venv ]]; then
            python3 -m venv .venv
          fi
          .venv/bin/pip install -q -U pip
          .venv/bin/pip install -q -e .
          systemctl restart fangyu
          sleep 2
          systemctl is-active fangyu
          curl -fsS http://127.0.0.1:8000/api/health
          echo
          EOF

      - name: Public health check
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          HEALTH_URL: ${{ vars.DEPLOY_HEALTH_URL }}
          UI_URL: ${{ vars.DEPLOY_UI_URL }}
        run: |
          HEALTH="${HEALTH_URL:-https://${HOST}/api/health}"
          UI="${UI_URL:-https://${HOST}/fangyu/}"
          curl -fsSk "$HEALTH"
          echo
          code=$(curl -fsSk -o /dev/null -w "%{http_code}" "$UI")
          test "$code" = "200"
          echo "ui:$code OK → $UI"
